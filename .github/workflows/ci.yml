name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install CJK fonts (for diagrams.py)
        run: sudo apt-get update && sudo apt-get install -y fonts-noto-cjk

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Run tests (mock mode, no API key needed)
        env:
          AIPPT_MOCK: "1"
          AIPPT_ENABLE_WEB_SEARCH: "false"
        run: uv run pytest tests/ -v

      - name: Smoke test — import app + render mock deck
        env:
          AIPPT_MOCK: "1"
        run: |
          uv run python -c "
          from app.main import app
          from fastapi.testclient import TestClient
          c = TestClient(app)
          assert c.get('/healthz').status_code == 200
          assert c.post('/api/kb/load_demo').status_code == 200
          print('smoke test OK')
          "
